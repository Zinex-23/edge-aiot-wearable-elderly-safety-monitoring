; PlatformIO Project Configuration File — S3_AIFD_V4
;
; V4: Clone from V1, but fall detection is threshold-based only:
;   peak_acc > 7.5g OR peak_gyro > 240 dps -> FALL_WATCH -> STILL_TIMING
; No TensorFlowLite model is used in this firmware.
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitm-1]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
upload_protocol = esp-builtin
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304
board_build.partitions = default.csv

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    h2zero/NimBLE-Arduino@^1.4.2
    adafruit/Adafruit NeoPixel@^1.12.0
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library@^1.1.2
