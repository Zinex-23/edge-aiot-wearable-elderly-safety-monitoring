; PlatformIO Project Configuration File — S3_AIFD_V3
;
; V3: Adds WiFi + Firebase RTDB streaming on top of V1's full pipeline.
;   - Firebase /status → "fall"  triggers STILL_TIMING directly
;   - Button SAFE      → writes  "non-fall" back to Firebase
;
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitm-1]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
upload_protocol = esp-builtin
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

; Use min_spiffs partition to maximise code space (WiFi + Firebase adds ~300 KB)
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304
board_build.partitions = min_spiffs.csv

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -I ../AI/model_updated_version_84/models
    -DCORE_DEBUG_LEVEL=0

lib_deps =
    tanakamasayuki/TensorFlowLite_ESP32@^1.0.0
    h2zero/NimBLE-Arduino@^1.4.2
    adafruit/Adafruit NeoPixel@^1.12.0
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library@^1.1.2
    mobizt/Firebase Arduino Client Library for ESP8266 and ESP32@^4.4.17
